# alembic.ini
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

[logging]
default_handler = console
loggers = root,sqlalchemy,alembic
handlers = console
qualname =

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
